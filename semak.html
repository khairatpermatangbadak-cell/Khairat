<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Semak Keahlian</title>

<style>
body{font-family:system-ui;background:#ecfdf5;margin:0;padding:20px}
.card{background:#fff;padding:20px;border-radius:16px;max-width:500px;margin:auto}
input,button{width:100%;padding:12px;margin-top:10px}
.badge{padding:6px 12px;border-radius:999px;font-weight:bold}
.AKTIF{background:#dcfce7;color:#16a34a}
.TIDAKAKTIF{background:#fef9c3;color:#ca8a04}
.TELAHMENAMATKANKEAHLIAN{background:#fee2e2;color:#dc2626}
</style>
</head>

<body>
<div class="card">
<h2>Semak Status Keahlian</h2>
<p>Masukkan No IC tanpa dash (-)</p>

<input id="ic" placeholder="900101011234">
<button onclick="semak()">Semak</button>

<div id="result"></div>
</div>

<script>
const API_URL="PASTE_URL_APPS_SCRIPT_DI_SINI";

function norm(s){return s.replace(/[^0-9]/g,'')}
function key(s){return s.toUpperCase().replace(/\s+/g,'').replace(/[()]/g,'')}

async function semak(){
 const ic=norm(document.getElementById("ic").value);
 const r=await fetch(API_URL+"?ic="+ic);
 const d=await r.json();
 if(!d.ok){result.innerHTML="<p>Status tidak dijumpai</p>";return;}
 const k=key(d.status);
 result.innerHTML=`
 <p><b>Nama:</b> ${d.nama}</p>
 <p><b>Status:</b> <span class="badge ${k}">${d.status}</span></p>`;
}
</script>
</body>
</html>
