<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Semak Status Keahlian - Khairat Permatang Badak</title>

  <style>
    :root{
      --bg:#ecfdf5;
      --card:#ffffff;
      --primary:#0f766e;
      --primary2:#065f46;
      --border:#99f6e4;
      --text:#064e3b;
      --muted:#475569;

      --okbg:#dcfce7; --ok:#16a34a;
      --warnbg:#fef9c3; --warn:#ca8a04;
      --badbg:#fee2e2; --bad:#dc2626;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Arial;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:720px;
      margin:auto;
      padding:24px 16px 60px;
    }

    h1{
      text-align:center;
      color:var(--primary2);
      margin-bottom:8px;
    }

    .subtitle{
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px;
      margin-top:20px;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      color:var(--muted);
    }

    input{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      font-size:16px;
    }

    button{
      margin-top:14px;
      width:100%;
      padding:14px;
      border-radius:14px;
      border:none;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }

    button:hover{opacity:.95}

    .msg{
      margin-top:14px;
      color:var(--muted);
      font-size:14px;
    }

    .result{
      margin-top:20px;
    }

    .row{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px dashed var(--border);
      font-size:15px;
    }

    .row:last-child{border-bottom:none}

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      font-weight:800;
      font-size:13px;
    }

    .AKTIF{background:var(--okbg);color:var(--ok)}
    .TIDAKAKTIF{background:var(--warnbg);color:var(--warn)}
    .TELAHMENAMATKANKEAHLIAN{background:var(--badbg);color:var(--bad)}

    .no-record{
      background:#fff;
      border:1px solid var(--border);
      padding:16px;
      border-radius:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .no-record b{color:var(--primary2)}

    .wa{
      display:inline-block;
      margin-top:6px;
      color:var(--primary);
      font-weight:800;
      text-decoration:none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Semak Status Keahlian</h1>
    <p class="subtitle">Masukkan No IC tanpa dash (-)</p>

    <div class="card">
      <label for="ic">No IC</label>
      <input id="ic" inputmode="numeric" placeholder="Contoh: 900101011234">

      <button id="btn">Semak Status</button>

      <div id="msg" class="msg"></div>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    // PASTE URL APPS SCRIPT ANDA DI SINI
    const API_URL = "PASTE_URL_APPS_SCRIPT_DI_SINI";

    const icEl = document.getElementById("ic");
    const btn  = document.getElementById("btn");
    const msg  = document.getElementById("msg");
    const res  = document.getElementById("result");

    function normIC(v){
      return String(v||"").replace(/[^0-9]/g,"").trim();
    }

    function statusKey(status){
      return String(status||"")
        .toUpperCase()
        .replace(/\s+/g,"")
        .replace(/[()\/-]/g,"");
    }

    function badge(status){
      const k = statusKey(status);
      return `<span class="badge ${k}">${status}</span>`;
    }

    async function semak(){
      res.innerHTML = "";
      msg.textContent = "Menyemak...";
      msg.style.color = "var(--muted)";

      const ic = normIC(icEl.value);
      if(ic.length < 8){
        msg.textContent = "Sila masukkan No IC yang sah.";
        msg.style.color = "var(--bad)";
        return;
      }

      try{
        const r = await fetch(`${API_URL}?ic=${encodeURIComponent(ic)}`);
        const d = await r.json();

        if(!d.ok){
          msg.textContent = "";
          res.innerHTML = `
            <div class="no-record">
              <b>Tiada rekod</b><br>
              Sila hubungi
              <a class="wa"
                 href="https://wa.me/60126256013?text=Saya%20ingin%20membuat%20semakan%20status%20keahlian%20khairat"
                 target="_blank">
                012-625 6013
              </a>
              untuk semakan lanjut.
            </div>
          `;
          return;
        }

        msg.textContent = "";
        res.innerHTML = `
          <div class="card">
            <div class="row">
              <div><b>Nama</b></div>
              <div>${d.nama || "-"}</div>
            </div>
            <div class="row">
              <div><b>Status</b></div>
              <div>${badge(d.status)}</div>
            </div>
          </div>
        `;
      }catch(e){
        msg.textContent = "Ralat sambungan. Sila cuba lagi.";
        msg.style.color = "var(--bad)";
      }
    }

    btn.addEventListener("click", semak);
    icEl.addEventListener("keydown", e => {
      if(e.key === "Enter") semak();
    });
  </script>
</body>
</html>
