<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Semak Status Keahlian</title>

<style>
:root{
  --primary:#0f766e;
  --light:#ecfdf5;
  --border:#99f6e4;
  --text:#064e3b;
  --muted:#475569;
  --green:#16a34a;
  --yellow:#ca8a04;
  --red:#dc2626;
}

body{
  margin:0;
  font-family:system-ui,Segoe UI,Arial;
  background:linear-gradient(180deg,#ecfdf5,#ffffff);
  color:var(--text);
}

.container{
  max-width:720px;
  margin:auto;
  padding:24px 16px 60px;
}

h1{text-align:center;color:var(--primary)}

.card{
  background:#fff;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
  margin-top:20px;
}

label{display:block;margin-top:12px}
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:16px;
}

button{
  margin-top:14px;
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:var(--primary);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:hover{opacity:.9}

.status{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  font-weight:700;
}

.ACTIVE{background:#dcfce7;color:var(--green)}
.PENDING{background:#fef9c3;color:var(--yellow)}
.SUSPENDED,.TERMINATED{background:#fee2e2;color:var(--red)}

.muted{color:var(--muted);font-size:.9rem}
</style>
</head>

<body>
<div class="container">

<h1>Semak Status Keahlian</h1>

<div class="card">
  <label>No IC (tanpa dash)</label>
  <input id="ic" placeholder="900101011234">
  <button onclick="semak()">Semak Status</button>
  <p id="msg" class="muted"></p>
</div>

<div id="result" class="card" style="display:none"></div>

</div>

<script>
const API_URL="PASTE_URL_WEB_APP_DISINI";

function norm(v){return v.replace(/[^0-9]/g,'')}

async function semak(){
  const ic=norm(document.getElementById("ic").value);
  if(ic.length<8){msg.textContent="No IC tidak sah";return}

  msg.textContent="Menyemak...";
  const res=await fetch(API_URL+"?ic="+ic);
  const d=await res.json();

  if(!d.ok){msg.textContent=d.message;return}

  result.style.display="block";
  result.innerHTML=`
    <p><strong>Nama:</strong> ${d.nama}</p>
    <p><strong>Status:</strong>
      <span class="status ${d.status}">${d.status}</span>
    </p>
    <p><strong>Tarikh Aktif:</strong> ${d.tarikh_aktif||"-"}</p>
    <p><strong>Tarikh Tamat:</strong> ${d.tarikh_tamat||"-"}</p>
  `;
  msg.textContent="";
}
</script>
</body>
</html>
