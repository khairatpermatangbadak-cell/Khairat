<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Senarai Permohonan</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

  <div class="mb-4">
    <h3>Senarai Permohonan Keahlian</h3>
    <p class="text-muted">Status: Menunggu Kelulusan</p>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">

      <input
        type="text"
        id="searchInput"
        class="form-control mb-3"
        placeholder="Cari nama / IC / telefon">

      <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
          <thead class="table-success">
            <tr>
              <th>Application ID</th>
              <th>Tarikh</th>
              <th>Nama</th>
              <th>IC</th>
              <th>Telefon</th>
              <th>Status</th>
              <th>Tindakan</th>
            </tr>
          </thead>
          <tbody id="applicationTable">
            <tr>
              <td colspan="7" class="text-center text-muted">
                Memuatkan data...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLH1TFwfcSAtMUjamoEge0VSFBogAEj6bnH40_-qhF0ZgRKzRq184FT018CrESpHvBJw/exec';

  let applications = [];

  document.addEventListener('DOMContentLoaded', function () {
    loadApplications();

    document.getElementById('searchInput').addEventListener('input', function () {
      renderTable(this.value);
    });
  });

  async function loadApplications() {
    const tbody = document.getElementById('applicationTable');

    try {
      const response = await fetch(SCRIPT_URL + '?action=pendingApplications');
      const result = await response.json();

      if (!result.success) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center text-danger">
              Gagal memuatkan data.
            </td>
          </tr>
        `;
        return;
      }

      applications = result.data || [];
      renderTable('');

    } catch (error) {
      console.error(error);

      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="text-center text-danger">
            Ralat sambungan ke server.
          </td>
        </tr>
      `;
    }
  }

  function renderTable(keyword) {
    const tbody = document.getElementById('applicationTable');
    const search = keyword.toLowerCase();

    const filtered = applications.filter(item => {
      return (
        String(item.nama || '').toLowerCase().includes(search) ||
        String(item.ic || '').toLowerCase().includes(search) ||
        String(item.telefon || '').toLowerCase().includes(search) ||
        String(item.application_id || '').toLowerCase().includes(search)
      );
    });

    if (filtered.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="text-center text-muted">
            Tiada permohonan dijumpai.
          </td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = filtered.map(item => {
      return `
        <tr>
          <td>${item.application_id || ''}</td>
          <td>${formatDate(item.submitted_at)}</td>
          <td>${item.nama || ''}</td>
          <td>${item.ic || ''}</td>
          <td>${item.telefon || ''}</td>
          <td>
            <span class="badge bg-warning text-dark">
              ${item.status || ''}
            </span>
          </td>
          <td>
            <a
              href="semak-permohonan.html?id=${encodeURIComponent(item.application_id)}"
              class="btn btn-sm btn-success">
              SEMAK
            </a>
          </td>
        </tr>
      `;
    }).join('');
  }

  function formatDate(value) {
    if (!value) return '';

    const date = new Date(value);

    if (isNaN(date.getTime())) {
      return value;
    }

    return date.toLocaleDateString('ms-MY', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
  }
</script>

</body>
</html>
