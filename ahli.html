<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Borang Permohonan Ahli</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="container py-4">

<div class="page-header">

<img src="assets/logo.png" class="logo">

<h2 class="mt-3">
PERTUBUHAN KHAIRAT KEMATIAN
KAMPUNG PERMATANG BADAK
</h2>

<h5>PPM-005-06-24061998</h5>

<h4 class="mt-3">
BORANG PERMOHONAN KEAHLIAN
</h4>

</div>

<form id="memberForm">

<div class="card mb-4">
<div class="card-body">

<h5 class="section-title">
Maklumat Ahli
</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label>Nama Penuh *</label>
<input type="text"
class="form-control"
id="nama"
required>
</div>

<div class="col-md-3 mb-3">
<label>No IC *</label>
<input type="text"
class="form-control"
id="ic"
maxlength="12"
required>
</div>

<div class="col-md-3 mb-3">
<label>Tarikh Lahir</label>
<input type="text"
class="form-control"
id="tarikh_lahir"
readonly>
</div>

<div class="col-md-3 mb-3">
<label>Umur</label>
<input type="text"
class="form-control"
id="umur"
readonly>
</div>

<div class="col-md-3 mb-3">
<label>Jantina</label>

<select id="jantina"
class="form-select">

<option value="">
Pilih
</option>

<option>
LELAKI
</option>

<option>
PEREMPUAN
</option>

</select>

</div>

<div class="col-md-3 mb-3">
<label>Status Perkahwinan</label>

<select id="status_perkahwinan"
class="form-select">

<option value="">
Pilih
</option>

<option>BUJANG</option>
<option>BERKAHWIN</option>
<option>DUDA</option>
<option>JANDA</option>

</select>

</div>

<div class="col-md-3 mb-3">
<label>Pekerjaan</label>
<input type="text"
id="pekerjaan"
class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Telefon *</label>
<input type="text"
id="telefon"
class="form-control"
required>
</div>

<div class="col-md-6 mb-3">
<label>Email *</label>
<input type="email"
id="email"
class="form-control"
required>
</div>

</div>
</div>
</div>

<div class="card mb-4">
<div class="card-body">

<h5 class="section-title">
Alamat
</h5>

<div class="mb-3">
<label>
No Rumah / No Lot & Nama Perumahan
</label>

<input type="text"
id="alamat_lot"
class="form-control">
</div>

<div class="mb-3">
<label>Jalan</label>

<input type="text"
id="alamat_jalan"
class="form-control">
</div>

<div class="mb-3">
<label>Kampung</label>

<input type="text"
id="alamat_kampung"
class="form-control">
</div>

<div class="row">

<div class="col-md-4 mb-3">
<input type="text"
id="alamat_poskod"
class="form-control"
placeholder="Poskod">
</div>

<div class="col-md-4 mb-3">

<select id="alamat_daerah"
class="form-select">

<option selected>
Kuantan
</option>

</select>

</div>

<div class="col-md-4 mb-3">

<select id="alamat_negeri"
class="form-select">

<option selected>
Pahang
</option>

<option>Johor</option>
<option>Selangor</option>
<option>Kelantan</option>
<option>Terengganu</option>

</select>

</div>

</div>

</div>
</div>

<!-- TEMPAT LETAK -->
<div id="tanggunganSection"></div>

<!-- WARIS -->
<div id="warisSection"></div>

<!-- PENAMAAN -->
<div id="penamaanSection"></div>

<!-- WAKIL -->
<div id="collectorSection"></div>

<!-- TANDATANGAN -->
<div id="signatureSection"></div>

<div class="text-center mb-5">

<button
type="submit"
class="btn btn-success btn-lg">

HANTAR PERMOHONAN

</button>

</div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<script src="assets/js/ahli.js"></script>

</body>
</html>
