<script>

function addSpouse(){

let html = `

<div class="spouse-card">

<div class="row">

<div class="col-md-6 mb-3">
<label>Nama Pasangan</label>
<input type="text"
class="form-control uppercase spouse-name">

</button>

`;

document
.getElementById('spouseContainer')
